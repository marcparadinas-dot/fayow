name: fayow
description: FaYoW - Points d'intérêt géolocalisés

publish_to: none

version: 1.0.0+7

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase — versions downgradées pour compatibilité iOS (Xcode 14 / Monterey)
  firebase_core: ^2.27.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  cloud_functions: ^4.7.6

  # Carte
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Géolocalisation
  geolocator: ^11.0.0
  flutter_compass: ^0.8.0

  # TTS
  flutter_tts: ^3.8.5

  # Permissions
  permission_handler: ^11.3.0

  # Foreground Service (Android uniquement — conditionné dans le code)
  flutter_foreground_task: ^8.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/fayow_bandeau_haut.png
    - assets/images/fayow_bandeau_bas.png
    - assets/icon/fayow-Logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/fayow-logo.png"
